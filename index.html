<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TownshipMarket | Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>TownshipMarket</h1>
    <input type="text" placeholder="Search products...">
  </header>

  <section class="featured">
    <h2>Featured Products</h2>
    <div class="grid">
      <div class="container mt-4">
  
  <div class="row">
   
    <div class="col-md-3 col-sm-6 mb-3">
      <div class="card">
        <img src="SmartPhone.png" class="card-img-top" alt="Smartphone">
        <div class="card-body text-center">
          <h5 class="card-title">Smartphone</h5>
          <p class="card-text">R3,500</p>
        </div>
      </div>
    </div>

    
    <div class="col-md-3 col-sm-6 mb-3">
      <div class="card">
        <img src="Running Shoes.png" class="card-img-top" alt="Running Shoes">
        <div class="card-body text-center">
          <h5 class="card-title">Running Shoes</h5>
          <p class="card-text">R850</p>
        </div>
      </div>
    </div>

   
    <div class="col-md-3 col-sm-6 mb-3">
      <div class="card">
        <img src="Leather Bag.png" class="card-img-top" alt="Leather Bag">
        <div class="card-body text-center">
          <h5 class="card-title">Leather Bag</h5>
          <p class="card-text">R1,200</p>
        </div>
      </div>
    </div>

    
    <div class="col-md-3 col-sm-6 mb-3">
      <div class="card">
        <img src="Bluetooth Speaker.png" class="card-img-top" alt="Bluetooth Speaker">
        <div class="card-body text-center">
          <h5 class="card-title">Bluetooth Speaker</h5>
          <p class="card-text">R650</p>
        </div>
      </div>
    </div>
  </div>
</div>

  </section>

  <footer>
    <p>&copy; 2026 TownshipMarket | Empowering Local Traders</p>
  </footer>
</body>
</html>
