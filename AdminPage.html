<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | TownshipMarket</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Admin Dashboard</h1>
  </header>

  <section class="dashboard">
    <h2>Seller Verification</h2>
    <table>
      <tr><th>Seller</th><th>Status</th><th>Action</th></tr>
      <tr><td>Thabo Sales</td><td>Pending</td><td><button>Approve</button></td></tr>
      <tr><td>Lebo.Fashion</td><td>Pending</td><td><button>Approve</button></td></tr>
    </table>

    <h2>Transaction Overview</h2>
    <p>Total Sales:R14,300 | New Orders: 12 | Disputes: 3</p>
  </section>
  <script>
  const buttons = document.querySelectorAll("table button");
  buttons.forEach(btn => {
    btn.addEventListener("click", function() {
      alert("Seller approved: " + this.parentElement.parentElement.cells[0].innerText);
    });
  });
</script>

</body>
</html>
